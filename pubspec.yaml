name: board_go
description: Local multiplayer board game platform — iPad as server/board, phones as player nodes.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Embedded WebSocket server (GameBoard)
  shelf: ^1.4.0
  shelf_web_socket: ^2.0.0
  shelf_router: ^1.1.0
  shelf_static: ^1.1.0
  web_socket_channel: ^3.0.0

  # Device discovery & connection
  bonsoir: ^6.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.0

  # Game pack execution
  webview_flutter: ^4.4.0

  # Flame game engine (board rendering, camera, effects)
  flame: ^1.36.0

  # Local persistence
  sqflite: ^2.3.0
  shared_preferences: ^2.3.0
  uuid: ^4.0.0
  sqflite_common_ffi: ^2.4.0+2
  wakelock_plus: ^1.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.24.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/gamepacks/simple_card_battle/manifest.json
    - assets/gamepacks/simple_card_battle/cards.json
    - assets/gamepacks/simple_card_battle/board_layout.json
    - assets/gamepacks/stockpile/
    - assets/gamepacks/stockpile/image/
    - assets/gamepacks/secret_hitler/manifest.json
    - assets/gamepacks/secret_hitler/cards.json
    # <web_node_begin> (auto-regenerated by scripts/build_web_node.sh)
    - assets/web_node/
    - assets/web_node/assets/
    - assets/web_node/assets/assets/gamepacks/secret_hitler/
    - assets/web_node/assets/assets/gamepacks/simple_card_battle/
    - assets/web_node/assets/assets/gamepacks/stockpile/
    - assets/web_node/assets/assets/gamepacks/stockpile/image/
    - assets/web_node/assets/assets/images/
    - assets/web_node/assets/fonts/
    - assets/web_node/assets/packages/wakelock_plus/assets/
    - assets/web_node/assets/shaders/
    - assets/web_node/canvaskit/
    - assets/web_node/canvaskit/chromium/
    - assets/web_node/icons/
    # <web_node_end>
